
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Yuri Manga Reader 💖</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111;
            color: white;
            padding-bottom: 80px;
        }
        header {
            background: #ff4da6;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .container {
            padding: 15px;
        }
        h2 {
            border-left: 5px solid #ff4da6;
            padding-left: 10px;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .manga-card {
            background: #222;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .manga-card:active {
            background: #2a2a2a;
            transform: scale(0.98);
        }
        .manga-card img {
            width: 100px;
            height: 140px;
            border-radius: 10px;
            margin-right: 15px;
            object-fit: cover;
            border: 1px solid #444;
        }
        .info {
            flex-grow: 1;
        }
        .info h3 {
            font-size: 18px;
            margin: 0 0 10px 0;
            color: #ffb3d9;
        }
        .read-btn {
            background: #ff4da6;
            border: none;
            padding: 12px;
            color: white;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav {
            display: flex;
            justify-content: space-around;
            background: #1a1a1a;
            padding: 10px;
            position:fixed;
            bottom: 0;
            width: 100%;
            border-top: 2px solid #ff4da6;
            z-index: 100;
        }
        .nav-item {
            background: transparent;
            border: none;
            color: white;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .nav-item span {
            font-size: 20px;
            margin-bottom: 3px;
        }
        .badge {
            background: #ff4da6;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<header>🌸 YuriMangaReader 🌸</header>

<div class="container">
    <h2>Special Picks 📖</h2>
    
    <div class="manga-card" style="border: 2px solid #ff4da6; background: #2d1b24;">
        <img src="https://dw9to29btj727.cloudfront.net/products/1975301416.jpg" alt="Murmur">
        <div class="info">
            <h3>Murmur <span class="badge">HOT</span></h3>
            <button class="read-btn" onclick="window.open('https://www.mangago.me/read-manga/murmur/', '_blank')">BASAHIN NA 🚀</button>
        </div>
    </div>

    <h2>Discover More 🌸</h2>

    <div class="manga-card">
        <img src="https://mangadex.org/covers/69046907-7393-455a-94a4-577884d94354/6556e43f-4277-45e0-8116-3e8179261021.jpg.256.jpg" alt="Bloom Into You">
        <div class="info">
            <h3>Bloom Into You</h3>
            <button class="read-btn" onclick="window.open('https://mangadex.org/title/69046907-7393-455a-94a4-577884d94354/bloom-into-you', '_blank')">READ NOW</button>
        </div>
    </div>

    <div class="manga-card">
        <img src="https://mangadex.org/covers/a2c00224-817a-4293-94c6-4d2c88981442/65e97022-7711-460d-8386-3023e9863483.jpg.256.jpg" alt="Citrus">
        <div class="info">
            <h3>Citrus</h3>
            <button class="read-btn" onclick="window.open('https://mangadex.org/title/a2c00224-817a-4293-94c6-4d2c88981442/citrus', '_blank')">READ NOW</button>
        </div>
    </div>

    <div class="manga-card">
        <img src="https://mangadex.org/covers/0e2da989-b043-4659-a6cf-c99000a65345/d7ec93ca-a36c-48c8-89c5-8472f77bc71b.jpg.256.jpg" alt="Whisper">
        <div class="info">
            <h3>Whisper Me a Love Song</h3>
            <button class="read-btn" onclick="window.open('https://mangadex.org/title/0e2da989-b043-4659-a6cf-c99000a65345/sasayaku-you-ni-koi-wo-utau', '_blank')">READ NOW</button>
        </div>
    </div>

</div>

<div class="nav">
    <button class="nav-item" onclick="location.reload()">
        <span>🏠</span>Home
    </button>
    <button class="nav-item" onclick="alert('Searching...')">
        <span>🔍</span>Search
    </button>
    <button class="nav-item" onclick="alert('Favs coming soon!')">
        <span>❤️</span>Favs
    </button>
</div>

<script>
    // Inalis muna ang complicated proxy fetch para sigurado tayong gagana sa phone mo.
    console.log("Shane's Yuri Reader is Ready!");
    
    // Service Worker registration para sa PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
